  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0d;
      --surface: #1a1a17;
      --surface2: #222220;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text-primary: #f0ede6;
      --text-secondary: #9a9890;
      --text-hint: #55534e;
      --green: #2ecf96;
      --green-dim: rgba(46,207,150,0.12);
      --green-mid: #9fe1cb;
      --green-dark: #085041;
      --blue: #5ba3e8;
      --blue-dim: rgba(91,163,232,0.12);
      --purple: #9b8ff5;
      --purple-dim: rgba(155,143,245,0.12);
      --amber: #f5b942;
      --amber-dim: rgba(245,185,66,0.12);
      --rose: #f07080;
      --rose-dim: rgba(240,112,128,0.12);
      --teal: #42d4c8;
      --teal-dim: rgba(66,212,200,0.12);
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: 5rem;
    }

    /* ── HEADER ── */
    header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1.4rem 1.25rem 1rem;
      position: sticky;
      top: 0;
      z-index: 200;
      backdrop-filter: blur(12px);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.9rem;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    header h1 em {
      font-style: normal;
      color: var(--green);
    }

    .header-meta {
      font-size: 11px;
      color: var(--text-hint);
      text-align: right;
      line-height: 1.5;
    }

    .header-meta strong {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--teal));
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }

    .progress-label {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      min-width: 48px;
      text-align: right;
      font-weight: 500;
    }

    /* ── START SCREEN ── */
    #start-screen {
      max-width: 420px;
      margin: 3rem auto;
      padding: 0 1.25rem;
    }

    .start-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .start-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .start-card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .start-card p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    .date-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-align: left;
      font-weight: 500;
    }

    .date-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .date-input:focus { border-color: var(--green); }
    .date-input::-webkit-calendar-picker-indicator { filter: invert(0.6); }

    .start-btn {
      width: 100%;
      background: var(--green);
      color: #0a2a1e;
      border: none;
      border-radius: var(--radius-md);
      padding: 0.85rem;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .start-btn:hover { opacity: 0.9; }
    .start-btn:active { transform: scale(0.98); }

    /* ── MAIN CONTENT ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    /* ── SECTION LABELS ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-hint);
      padding: 0.5rem 0 0.2rem;
    }

    /* ── TODAY CARD ── */
    .today-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 0.4rem;
    }

    .today-header {
      padding: 1rem 1.1rem 0.85rem;
      border-bottom: 1px solid var(--border);
    }

    .today-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 0.5rem;
    }

    .today-tag.future { background: var(--blue-dim); color: var(--blue); }

    .today-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.2rem;
    }

    .today-sub {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .today-progress-bar-wrap {
      height: 3px;
      background: var(--border);
      margin-top: 0.75rem;
    }
    .today-progress-bar {
      height: 100%;
      background: var(--green);
      transition: width 0.4s ease;
    }

    /* ── DAY CARD (past/future) ── */
    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .day-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      cursor: pointer;
      user-select: none;
    }

    .day-card-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .day-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .day-dot.done { background: var(--green); }
    .day-dot.partial { background: var(--amber); }
    .day-dot.empty { background: var(--text-hint); }

    .day-card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .day-card-title.done-title { color: var(--text-hint); text-decoration: line-through; }

    .day-card-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .day-card-count {
      font-size: 11px;
      color: var(--text-hint);
      font-weight: 500;
    }

    .day-card-count.all-done { color: var(--green); }

    .chevron-sm {
      width: 14px;
      height: 14px;
      color: var(--text-hint);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .day-card.open .chevron-sm { transform: rotate(180deg); }

    .day-body { display: none; border-top: 1px solid var(--border); padding: 0.5rem 0; }
    .day-card.open .day-body { display: block; }

    /* ── CHECK ITEMS ── */
    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 0.55rem 1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .check-item:hover { background: rgba(255,255,255,0.02); }

    .checkbox {
      width: 19px;
      height: 19px;
      border: 1.5px solid var(--text-hint);
      border-radius: 5px;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .checkbox.checked {
      background: var(--green);
      border-color: var(--green);
    }
    .checkbox.checked::after {
      content: '';
      display: block;
      width: 4px;
      height: 8px;
      border: 1.5px solid #0a2a1e;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-0.5px, -1px);
    }

    .item-text {
      font-size: 13.5px;
      line-height: 1.55;
      color: var(--text-primary);
      flex: 1;
    }
    .item-text.done {
      color: var(--text-hint);
      text-decoration: line-through;
    }

    .shake-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      background: var(--green-dim);
      color: var(--green);
      padding: 2px 7px;
      border-radius: 20px;
      margin-left: 5px;
      vertical-align: middle;
    }

    /* ── WEEK COLOR ACCENTS ── */
    .acc-w1 { color: var(--green); }
    .acc-w2 { color: var(--blue); }
    .acc-w3 { color: var(--purple); }
    .acc-w4 { color: var(--amber); }
    .acc-w5 { color: var(--rose); }
    .acc-w6 { color: var(--teal); }

    .dot-w1 { background: var(--green) !important; }
    .dot-w2 { background: var(--blue) !important; }
    .dot-w3 { background: var(--purple) !important; }
    .dot-w4 { background: var(--amber) !important; }
    .dot-w5 { background: var(--rose) !important; }
    .dot-w6 { background: var(--teal) !important; }

    /* today tag color per week */
    .tag-w1 { background: var(--green-dim); color: var(--green); }
    .tag-w2 { background: var(--blue-dim); color: var(--blue); }
    .tag-w3 { background: var(--purple-dim); color: var(--purple); }

/* flat array of all days */
const ALL_DAYS = [];
WEEKS.forEach((week, wi) => {
  week.days.forEach((day, di) => {
    ALL_DAYS.push({ wi, di, week, day, globalIdx: ALL_DAYS.length });
  });
});

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const SK = 'switchon_v2';
let appState = {};

function loadState() {
  try { appState = JSON.parse(localStorage.getItem(SK) || '{}'); } catch { appState = {}; }
}
function saveState() {
  localStorage.setItem(SK, JSON.stringify(appState));
}

function getStartDate() { return appState.startDate || null; }
function setStartDate(d) { appState.startDate = d; saveState(); }

function isChecked(globalIdx, ii) {
  return !!(appState.checks && appState.checks[globalIdx] && appState.checks[globalIdx][ii]);
}
function toggleCheck(globalIdx, ii) {
  if (!appState.checks) appState.checks = {};
  if (!appState.checks[globalIdx]) appState.checks[globalIdx] = {};
  appState.checks[globalIdx][ii] = !appState.checks[globalIdx][ii];
  saveState();
}

function resetAllChecks() {
  appState.checks = {};
  saveState();
}

/* ═══════════════════════════════════════════
   DATE HELPERS
═══════════════════════════════════════════ */
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dy}`;
}

function daysBetween(a, b) {
  // a, b: 'YYYY-MM-DD'
  const da = new Date(a), db = new Date(b);
  return Math.floor((db - da) / 86400000);
}

function formatDate(str) {
  // YYYY-MM-DD → M월 D일 (요일)
  const d = new Date(str);
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

function dayIndexForDate(dateStr) {
  // returns 0-based global day index, or null
  const start = getStartDate();
  if (!start) return null;
  const diff = daysBetween(start, dateStr);
  if (diff < 0 || diff >= 42) return null;
  return diff;
}

/* ═══════════════════════════════════════════
   START SCREEN
═══════════════════════════════════════════ */
function confirmStart() {
  const val = document.getElementById('start-date-input').value;
  if (!val) { alert('날짜를 선택해 주세요.'); return; }
  setStartDate(val);
  showApp();
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function showApp() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('app-header').style.display = 'block';
  document.getElementById('app-main').style.display = 'block';
  renderApp();
}

function renderApp() {
  const main = document.getElementById('app-main');
  main.innerHTML = '';

  const start = getStartDate();
  const today = todayStr();
  const todayGlobal = dayIndexForDate(today);

  // Header meta
  updateHeaderMeta(todayGlobal, today, start);

  // Determine day ranges
  const pastDays = [];
  const currentDayEntry = todayGlobal !== null ? ALL_DAYS[todayGlobal] : null;
  const futureDays = [];

  ALL_DAYS.forEach((entry) => {
    if (entry.globalIdx < (todayGlobal ?? 0)) pastDays.push(entry);
    else if (entry.globalIdx > (todayGlobal ?? -1)) futureDays.push(entry);
  });

  // ── TODAY ──
  if (todayGlobal !== null && todayGlobal < 42) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = '오늘';
    main.appendChild(lbl);
    main.appendChild(buildTodayCard(currentDayEntry, today));
  } else if (todayGlobal === null) {
    const diff = daysBetween(start, today);
    if (diff >= 42) {
      // Finished
      const box = document.createElement('div');
      box.className = 'congrats-box';
      box.innerHTML = '<h2>🎉 42일 완주!</h2><p>스위치온 다이어트 프로그램을 완료했습니다.<br>체성분 변화를 측정하고 새로운 목표를 세워보세요!</p>';
      main.appendChild(box);
    } else {
      // Before start
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = `D-${Math.abs(diff)} · 시작 전`;
      main.appendChild(lbl);
    }
  }

  // ── PAST DAYS ──
  if (pastDays.length > 0) {
    const sec = document.createElement('div');
    sec.className = 'past-section';
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = '지난 기록';
    sec.appendChild(lbl);
    // reverse: most recent first
    [...pastDays].reverse().forEach(entry => {
      sec.appendChild(buildPastCard(entry, start));
    });
    main.appendChild(sec);
  }

  // ── FUTURE DAYS (only next 3 visible, rest hidden) ──
  if (futureDays.length > 0 && todayGlobal !== null) {
    const sec = document.createElement('div');
    sec.className = 'past-section';
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = '앞으로의 일정';
    sec.appendChild(lbl);
    futureDays.slice(0, 6).forEach(entry => {
      sec.appendChild(buildFutureCard(entry, start));
    });
    if (futureDays.length > 6) {
      const more = document.createElement('div');
      more.style.cssText = 'text-align:center;padding:0.6rem;font-size:11px;color:var(--text-hint);';
      more.textContent = `+ ${futureDays.length - 6}일 남음`;
      sec.appendChild(more);
    }
    main.appendChild(sec);
  }

  // ── CONTROLS ──
  const ctrl = document.createElement('div');
  ctrl.className = 'controls-row';
  ctrl.innerHTML = `
    <button class="ctrl-btn" onclick="changeStartDate()">시작일 변경</button>
    <button class="ctrl-btn" onclick="doReset()">전체 초기화</button>
  `;
  main.appendChild(ctrl);

  // ── TIP ──
  const tip = document.createElement('div');
  tip.className = 'tip-box';
  tip.innerHTML = '<strong>💡 주의사항</strong>물은 하루 8컵 이상 필수. 매 저녁 식사는 취침 2~4시간 전에 마치고, 전날 저녁부터 14시간 공복을 유지하세요. 단식 후에는 반드시 고단백 식사로 근손실을 방지하세요.';
  main.appendChild(tip);

  updateTotalProgress();
}

function updateHeaderMeta(todayGlobal, today, start) {
  const dayEl = document.getElementById('hdr-day');
  const dateEl = document.getElementById('hdr-date');
  if (todayGlobal !== null && todayGlobal < 42) {
    const entry = ALL_DAYS[todayGlobal];
    dayEl.textContent = `${entry.day.label} · ${entry.week.label}`;
  } else {
    const diff = daysBetween(start, today);
    if (diff >= 42) dayEl.textContent = '42일 완주 🎉';
    else dayEl.textContent = `D${diff < 0 ? diff : '+'+diff}`;
  }
  dateEl.textContent = formatDate(today);
}

/* ── TODAY CARD ── */
function buildTodayCard(entry, today) {
  const { wi, di, week, day, globalIdx } = entry;
  const cls = week.cls;

  const card = document.createElement('div');
  card.className = 'today-card';
  card.id = `today-card-${globalIdx}`;

  // header
  const hdr = document.createElement('div');
  hdr.className = 'today-header';

  const tag = document.createElement('div');
  tag.className = `today-tag tag-${cls}`;
  tag.textContent = `${week.label} · ${week.badge}`;
  hdr.appendChild(tag);

  const title = document.createElement('div');
  title.className = 'today-title';
  title.textContent = day.label;
  hdr.appendChild(title);

  const sub = document.createElement('div');
  sub.className = 'today-sub';
  sub.textContent = `${formatDate(today)} · ${day.sub}`;
  hdr.appendChild(sub);

  const progWrap = document.createElement('div');
  progWrap.className = 'today-progress-bar-wrap';
  const progBar = document.createElement('div');
  progBar.className = `today-progress-bar today-bar-${cls}`;
  progBar.id = `today-bar-${globalIdx}`;
  progWrap.appendChild(progBar);
  hdr.appendChild(progWrap);

  card.appendChild(hdr);

  // items
  const body = document.createElement('div');
  body.style.cssText = 'padding: 0.25rem 0;';
  day.items.forEach((item, ii) => {
    body.appendChild(buildCheckItem(globalIdx, ii, item, cls, () => {
      updateTodayProgress(entry);
      updateTotalProgress();
    }));
  });
  card.appendChild(body);

  updateTodayProgress(entry);
  return card;
}

function updateTodayProgress(entry) {
  const { day, globalIdx } = entry;
  let done = 0;
  day.items.forEach((_, ii) => { if (isChecked(globalIdx, ii)) done++; });
  const pct = Math.round(done / day.items.length * 100);
  const bar = document.getElementById(`today-bar-${globalIdx}`);
  if (bar) bar.style.width = pct + '%';
}

/* ── PAST CARD ── */
function buildPastCard(entry, start) {
  const { wi, di, week, day, globalIdx } = entry;
  const cls = week.cls;
  const dateStr = offsetDate(start, globalIdx);

  let done = 0;
  day.items.forEach((_, ii) => { if (isChecked(globalIdx, ii)) done++; });
  const total = day.items.length;
  const allDone = done === total;
  const partial = done > 0 && !allDone;

  const card = document.createElement('div');
  card.className = 'day-card';
  card.id = `past-${globalIdx}`;

  const hdr = document.createElement('div');
  hdr.className = 'day-card-header';

  const dot = document.createElement('div');
  dot.className = `day-dot ${allDone ? 'done dot-'+cls : partial ? 'partial' : 'empty'}`;

  const titleEl = document.createElement('div');
  titleEl.className = `day-card-title${allDone ? ' done-title' : ''}`;
  titleEl.textContent = `${day.label} · ${formatDate(dateStr)}`;

  const left = document.createElement('div');
  left.className = 'day-card-left';
  left.appendChild(dot);
  left.appendChild(titleEl);

  const countEl = document.createElement('div');
  countEl.className = `day-card-count${allDone ? ' all-done' : ''}`;
  countEl.id = `count-${globalIdx}`;
  countEl.textContent = `${done}/${total}`;

  const chevron = document.createElement('svg');
  chevron.className = 'chevron-sm';
  chevron.setAttribute('viewBox','0 0 14 14');
  chevron.setAttribute('fill','none');
  chevron.setAttribute('stroke','currentColor');
  chevron.setAttribute('stroke-width','1.8');
  chevron.innerHTML = '<path d="M3 5l4 4 4-4"/>';

  const right = document.createElement('div');
  right.className = 'day-card-right';
  right.appendChild(countEl);
  right.appendChild(chevron);

  hdr.appendChild(left);
  hdr.appendChild(right);
  hdr.addEventListener('click', () => card.classList.toggle('open'));
  card.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'day-body';
  day.items.forEach((item, ii) => {
    body.appendChild(buildCheckItem(globalIdx, ii, item, cls, () => {
      updatePastCardUI(entry, card);
      updateTotalProgress();
    }));
  });
  card.appendChild(body);

  return card;
}

function updatePastCardUI(entry, card) {
  const { day, globalIdx, week } = entry;
  const cls = week.cls;
  let done = 0;
  day.items.forEach((_, ii) => { if (isChecked(globalIdx, ii)) done++; });
  const total = day.items.length;
  const allDone = done === total;
  const partial = done > 0 && !allDone;

  const dot = card.querySelector('.day-dot');
  dot.className = `day-dot ${allDone ? 'done dot-'+cls : partial ? 'partial' : 'empty'}`;

  const title = card.querySelector('.day-card-title');
  title.className = `day-card-title${allDone ? ' done-title' : ''}`;

  const countEl = document.getElementById(`count-${globalIdx}`);
  if (countEl) {
    countEl.textContent = `${done}/${total}`;
    countEl.className = `day-card-count${allDone ? ' all-done' : ''}`;
  }
}

/* ── FUTURE CARD ── */
function buildFutureCard(entry, start) {
  const { day, globalIdx, week } = entry;
  const dateStr = offsetDate(start, globalIdx);

  const card = document.createElement('div');
  card.className = 'day-card future-card';

  const hdr = document.createElement('div');
  hdr.className = 'day-card-header';
  hdr.style.cursor = 'default';

  const dot = document.createElement('div');
  dot.className = 'day-dot empty';

  const titleEl = document.createElement('div');
  titleEl.className = 'day-card-title';
  titleEl.textContent = `${day.label} · ${formatDate(dateStr)}`;

  const left = document.createElement('div');
  left.className = 'day-card-left';
  left.appendChild(dot);
  left.appendChild(titleEl);

  const sub = document.createElement('div');
  sub.style.cssText = 'font-size:11px;color:var(--text-hint);';
  sub.textContent = day.sub;

  hdr.appendChild(left);
  hdr.appendChild(sub);
  card.appendChild(hdr);

  return card;
}

/* ── CHECK ITEM ── */
function buildCheckItem(globalIdx, ii, item, cls, onChange) {
  const row = document.createElement('div');
  row.className = 'check-item';
  row.id = `ci-${globalIdx}-${ii}`;

  const cb = document.createElement('div');
  cb.className = 'checkbox' + (isChecked(globalIdx, ii) ? ' checked' : '');
  cb.id = `cb-${globalIdx}-${ii}`;

  const txt = document.createElement('div');
  txt.className = 'item-text' + (isChecked(globalIdx, ii) ? ' done' : '');
  txt.innerHTML = item.text + (item.shake ? '<span class="shake-tag">쉐이크</span>' : '');
  txt.id = `txt-${globalIdx}-${ii}`;

  row.appendChild(cb);
  row.appendChild(txt);

  row.addEventListener('click', () => {
    toggleCheck(globalIdx, ii);
    const checked = isChecked(globalIdx, ii);
    cb.className = 'checkbox' + (checked ? ' checked' : '');
    txt.className = 'item-text' + (checked ? ' done' : '');
    onChange();
  });

  return row;
}

/* ── TOTAL PROGRESS ── */
function updateTotalProgress() {
  let total = 0, done = 0;
  ALL_DAYS.forEach(entry => {
    entry.day.items.forEach((_, ii) => {
      total++;
      if (isChecked(entry.globalIdx, ii)) done++;
    });
  });
  document.getElementById('total-label').textContent = `${done} / ${total}`;
  document.getElementById('total-bar').style.width = total ? (done/total*100).toFixed(0)+'%' : '0%';
}

/* ── UTILS ── */
function offsetDate(start, offsetDays) {
  const d = new Date(start);
  d.setDate(d.getDate() + offsetDays);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dy}`;
}

/* ── CONTROLS ── */
function changeStartDate() {
  if (!confirm('시작일을 변경하면 날짜 계산이 달라집니다. 체크 기록은 유지됩니다. 계속할까요?')) return;
  appState.startDate = null;
  saveState();
  document.getElementById('app-header').style.display = 'none';
  document.getElementById('app-main').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
  // prefill with previous date
  const inp = document.getElementById('start-date-input');
  inp.value = '';
}

function doReset() {
  if (!confirm('모든 체크 항목을 초기화할까요?')) return;
  resetAllChecks();
  renderApp();
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
loadState();

// prefill today in start input
document.getElementById('start-date-input').value = todayStr();

if (getStartDate()) {
  showApp();
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
